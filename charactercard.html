<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Character Card for WDD131">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
    <title>Document</title>
</head>
<body>
    <h1 id="cardName"></h1>
    <div class="card">
        <img id="characterImage" class="image" alt="Character Image">

        <h2 id="characterName" class="name"></h2>

        <div class="stats">
            <p><strong>Class:</strong> <span id="characterClass"></span></p>
            <p><strong>Level:</strong> <span id="characterLevel"></span></p>
            <p><strong>Health:</strong> <span id="characterHealth"></span></p>
        </div>

        <div class="buttons">
            <button id="attackBtn">Attack Character</button>
            <button id="levelBtn">Level Up</button>
        </div>
    </div>
</body>
</html>
