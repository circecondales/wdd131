<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Ticket</title>
    <link rel="icon" href="images/event.ico">
    <link rel="stylesheet" href="eventform.css" />
    <script src="eventform.js" defer></script>
    </head>
<body>
    <main class="wrapper">
        <h1>Event Ticket</h1>

        <form id="eventForm">
        <div class="field">
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" required />
        </div>

        <div class="field">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" required />
        </div>

        <div class="field full">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
        </div>

        <div class="field">
            <label for="typeRange">Type</label>
            <select
            id="typeRange"
            name="typeRange"
            aria-controls="notesContainer"
            required
            >
            <option value="">Choose one</option>
            <option value="student-id">Student</option>
            <option value="event-code">Guest</option>
            </select>
        </div>

        <div class="field">
            <label for="availableDate">Event Date</label>
            <input id="availableDate" name="availableDate" type="date" required />
        </div>


        <div id="notesContainer" class="field full" hidden>
            <label for="notes">Event Notes</label>
            <input id="notes" name="notes" type="text" />
        </div>

        <button class="full" type="submit">Submit Preferences</button>
        </form>

        <section id="output" aria-live="polite"></section>
    </main>
</body>
</html>
